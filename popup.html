<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 300px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      margin: 0;
    }
    .header {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 12px;
    }
    .status {
      padding: 8px;
      border-radius: 4px;
      margin-bottom: 12px;
    }
    .status.connected {
      background-color: #d4edda;
      color: #155724;
    }
    .status.disconnected {
      background-color: #f8d7da;
      color: #721c24;
    }
    .info {
      font-size: 12px;
      color: #666;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <div class="header">Time Tracking Extension</div>
  <div id="status" class="status disconnected">Checking connection...</div>
  <div class="info">This extension monitors your browser tabs and sends URL updates to the time tracking agent.</div>
  
  <script src="popup.js"></script>
</body>
</html>
